<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISA Portfolio Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #070b14; --bg2: #0f172a; --bg3: #1a2332; --border: #1e293b;
    --border2: #141c2e; --border3: #111827;
    --text: #e2e8f0; --text2: #cbd5e1; --text3: #94a3b8; --text4: #64748b; --text5: #475569; --text6: #334155;
    --teal: #2dd4bf; --teal-dark: #0d9488; --teal-bg: #022c22;
    --red: #ef4444; --blue: #60a5fa; --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
  .mono { font-family: var(--mono); }

  /* Header */
  .header { background: linear-gradient(180deg, #0c1220, var(--bg)); border-bottom: 1px solid var(--border2); padding: 16px 28px 0; position: sticky; top: 0; z-index: 10; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 10px; }
  .header-title { display: flex; align-items: center; gap: 10px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; }
  .header h1 { font-size: 20px; font-weight: 700; color: #f8fafc; letter-spacing: -0.3px; }
  .header-sub { margin: 3px 0 0 18px; font-size: 12px; color: var(--text5); }
  .nav { display: flex; gap: 0; border-top: 1px solid var(--border2); }
  .nav-btn { background: transparent; color: var(--text4); border: none; border-bottom: 2px solid transparent; padding: 10px 18px; cursor: pointer; font-size: 13.5px; font-weight: 500; transition: all 0.2s; font-family: var(--sans); }
  .nav-btn.active { background: rgba(45,212,191,0.12); color: var(--teal); border-bottom-color: var(--teal); font-weight: 600; }

  .refresh-btn { background: linear-gradient(135deg, var(--teal-dark), var(--teal)); color: var(--teal-bg); border: none; border-radius: 8px; padding: 9px 22px; cursor: pointer; font-size: 13px; font-weight: 700; letter-spacing: 0.3px; transition: all 0.3s; box-shadow: 0 0 20px rgba(45,212,191,0.15); font-family: var(--sans); }
  .refresh-btn:disabled { background: var(--border3); color: var(--text5); cursor: not-allowed; box-shadow: none; }

  .content { padding: 24px 28px; max-width: 1280px; }

  /* Cards */
  .card { background: linear-gradient(145deg, var(--bg2), var(--bg3)); border: 1px solid var(--border); border-radius: 10px; padding: 22px; }
  .card-title { font-size: 13px; color: var(--text5); margin: 0 0 16px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }

  /* Stat cards */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(185px, 1fr)); gap: 14px; margin-bottom: 22px; }
  .stat-card { background: linear-gradient(145deg, var(--bg2), var(--bg3)); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; position: relative; overflow: hidden; }
  .stat-icon { position: absolute; top: -8px; right: -4px; font-size: 48px; opacity: 0.06; }
  .stat-label { font-size: 11px; color: var(--text5); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 600; }
  .stat-value { font-size: 22px; font-weight: 700; font-family: var(--mono); letter-spacing: -0.5px; }
  .stat-sub { font-size: 11.5px; margin-top: 5px; }

  /* Charts row */
  .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(330px, 1fr)); gap: 14px; margin-bottom: 22px; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  th { text-align: left; padding: 8px 6px; color: var(--text6); font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; white-space: nowrap; border-bottom: 1px solid var(--border); }
  td { padding: 9px 6px; }
  tbody tr { border-bottom: 1px solid var(--border3); }
  tfoot tr { border-top: 2px solid var(--border); }
  .sector-badge { padding: 2px 7px; border-radius: 4px; font-size: 10.5px; white-space: nowrap; }

  /* Bar chart */
  .bar-row { display: flex; align-items: center; gap: 10px; font-size: 12.5px; margin-bottom: 6px; }
  .bar-label { width: 150px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; font-size: 12px; }
  .bar-track { flex: 1; background: var(--border3); border-radius: 3px; height: 20px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
  .bar-value { width: 80px; text-align: right; flex-shrink: 0; font-family: var(--mono); font-size: 12px; }

  /* Pie */
  .pie-wrap { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
  .pie-legend { display: flex; flex-direction: column; gap: 5px; font-size: 12.5px; }
  .pie-legend-item { display: flex; align-items: center; gap: 8px; cursor: pointer; transition: opacity 0.2s; }
  .pie-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* API key */
  .api-bar { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 18px; margin-bottom: 18px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .api-bar label { font-size: 12px; color: var(--text4); white-space: nowrap; }
  .api-bar input { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 7px 12px; font-size: 12px; font-family: var(--mono); flex: 1; min-width: 200px; outline: none; }
  .api-bar input:focus { border-color: var(--teal); }
  .api-bar .hint { font-size: 11px; color: var(--text6); width: 100%; }

  /* Alert */
  .alert { border-radius: 8px; padding: 10px 18px; margin-bottom: 20px; font-size: 12.5px; }
  .alert-info { background: #0c1a1f; color: var(--teal); border: 1px solid rgba(45,212,191,0.13); }
  .alert-error { background: #1c1117; color: var(--red); border: 1px solid rgba(239,68,68,0.2); }

  /* Holdings management */
  .manage-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
  .manage-bar h3 { font-size: 15px; color: #f1f5f9; font-weight: 600; }
  .btn-ghost { background: transparent; color: var(--text4); border: 1px solid var(--border); border-radius: 7px; padding: 8px 14px; cursor: pointer; font-size: 12.5px; font-family: var(--sans); }
  .btn-primary { background: linear-gradient(135deg, var(--teal-dark), var(--teal)); color: var(--teal-bg); border: none; border-radius: 7px; padding: 8px 16px; cursor: pointer; font-size: 12.5px; font-weight: 700; font-family: var(--sans); }
  .btn-danger { background: transparent; color: #7f1d1d; border: 1px solid rgba(127,29,29,0.2); border-radius: 7px; padding: 7px 14px; cursor: pointer; font-size: 12px; font-family: var(--sans); }
  .btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 4px; }
  .edit-input { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px; padding: 6px 8px; font-size: 12px; outline: none; font-family: var(--sans); }
  .edit-input:focus { border-color: var(--teal); }

  .footnote { font-size: 11px; color: var(--text6); margin-top: 12px; }

  /* Add form */
  .add-form { max-width: 480px; }
  .add-form label { font-size: 11.5px; color: var(--text5); display: block; margin-bottom: 5px; font-weight: 500; }
  .add-form input, .add-form select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 9px 12px; font-size: 13px; outline: none; font-family: var(--sans); }
  .add-form input:focus, .add-form select:focus { border-color: var(--teal); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 22px; }
  .form-group { margin-bottom: 14px; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ─── DATA ──────────────────────────────────────────────────────
const DEFAULT_HOLDINGS = [
  { id:1,  instrument:"Veolia Environnement SA", ticker:"VIE.PA", isin:"FR0000124141", quantity:62.0390135, currency:"EUR", purchasePrice:29.22 },
  { id:2,  instrument:"Freenet AG", ticker:"FNTN.DE", isin:"DE000A0Z2ZZ5", quantity:63.117816, currency:"EUR", purchasePrice:28.15 },
  { id:3,  instrument:"iShares Physical Gold ETC", ticker:"IGLN.L", isin:"IE00B4ND3602", quantity:30, currency:"GBX", purchasePrice:4659.55 },
  { id:4,  instrument:"Terna - Rete Elettrica Nazionale", ticker:"TEZNY", isin:"US88088L1035", quantity:56.086556, currency:"USD", purchasePrice:27.91 },
  { id:5,  instrument:"KSB SE & Co KGaA", ticker:"KSB3.DE", isin:"DE0006292030", quantity:0.8084155, currency:"EUR", purchasePrice:831.42 },
  { id:6,  instrument:"NAC Kazatomprom JSC", ticker:"KAP", isin:"US63253R2013", quantity:30, currency:"USD", purchasePrice:43.68 },
  { id:7,  instrument:"iShares Physical Silver ETC", ticker:"ISLN.L", isin:"IE00B4NCWG09", quantity:40, currency:"GBX", purchasePrice:2976.72 },
  { id:8,  instrument:"Invesco Bond Income Plus Ltd", ticker:"BIPS.L", isin:"JE00B6RMDP68", quantity:1200, currency:"GBX", purchasePrice:175.15 },
  { id:9,  instrument:"M&G Credit Income Investment Trust PLC", ticker:"MGCI.L", isin:"GB00BFYYL325", quantity:2100, currency:"GBX", purchasePrice:95.07 },
  { id:10, instrument:"UNITE Group PLC", ticker:"UTG.L", isin:"GB0006928617", quantity:220, currency:"GBX", purchasePrice:682.34 },
  { id:11, instrument:"SPDR MSCI Europe Small Cap Value Weighted UCITS ETF", ticker:"ZPRX.DE", isin:"IE00BSPLC298", quantity:39, currency:"EUR", purchasePrice:58.90 },
  { id:12, instrument:"Novo Nordisk A/S", ticker:"NVO", isin:"DK0062498333", quantity:26.5, currency:"EUR", purchasePrice:41.97 },
  { id:13, instrument:"JPMorgan Asia Growth & Income PLC", ticker:"JAGI.L", isin:"GB0001320778", quantity:200, currency:"GBX", purchasePrice:451.40 },
  { id:14, instrument:"TBC Bank Group PLC", ticker:"TBCG.L", isin:"GB00BYT18307", quantity:27, currency:"GBX", purchasePrice:3818.52 },
];

const DIVIDENDS_BY_ISIN = {
  "JE00B6RMDP68":73.50, "DE000A0Z2ZZ5":36.96, "GB0001320778":12.10,
  "US63253R2013":37.16, "DE0006292030":17.55, "GB00BFYYL325":78.54,
  "GB00BYT18307":11.10, "US88088L1035":28.05, "GB0006928617":23.69,
  "FR0000124141":21.68,
};

const SECTOR_MAP = {
  "VIE.PA":"Utilities","FNTN.DE":"Telecom","IGLN.L":"Commodities","TEZNY":"Utilities",
  "KSB3.DE":"Industrials","KAP":"Energy","ISLN.L":"Commodities","BIPS.L":"Fixed Income",
  "MGCI.L":"Fixed Income","UTG.L":"Real Estate","ZPRX.DE":"Diversified","NVO":"Healthcare",
  "JAGI.L":"Diversified","TBCG.L":"Financials",
};

const SECTOR_COLORS = {
  Utilities:"#2dd4bf",Telecom:"#818cf8",Commodities:"#fbbf24",Materials:"#f87171",
  Financials:"#60a5fa","Real Estate":"#a78bfa",Healthcare:"#34d399",Industrials:"#fb923c",
  Technology:"#f472b6",Energy:"#facc15",Consumer:"#4ade80","Fixed Income":"#94a3b8",
  Diversified:"#c084fc",Unknown:"#64748b",
};

const FX_DEFAULT = { EUR:0.84, USD:0.79, GBX:0.01, GBP:1 };

// ─── STATE ─────────────────────────────────────────────────────
let state = {
  holdings: [...DEFAULT_HOLDINGS],
  marketData: {},
  fxRates: { ...FX_DEFAULT },
  lastRefresh: null,
  loading: false,
  loadingMsg: "",
  error: null,
  view: "dashboard",
  editingId: null,
  editForm: {},
  tdApiKey: "7b55d1dd553345dd8d0010aa328b539a",
};

// Save/load from localStorage
function saveState() {
  try {
    localStorage.setItem("portfolio-v4", JSON.stringify({
      holdings: state.holdings, marketData: state.marketData,
      fxRates: state.fxRates, lastRefresh: state.lastRefresh,
    }));
  } catch(e) {}
}
function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem("portfolio-v4"));
    if (s && s.holdings && s.holdings.length) {
      state.holdings = s.holdings;
      if (s.marketData) state.marketData = s.marketData;
      if (s.fxRates) state.fxRates = s.fxRates;
      if (s.lastRefresh) state.lastRefresh = s.lastRefresh;
    }
  } catch(e) {}
}
loadState();

// ─── HELPERS ───────────────────────────────────────────────────
function toGBP(val, cur, fx) {
  if (cur==="GBP") return val;
  if (cur==="GBX") return val*(fx.GBX||0.01);
  if (cur==="EUR") return val*(fx.EUR||0.84);
  if (cur==="USD") return val*(fx.USD||0.79);
  return val;
}
function fmtGBP(v) { return "\u00a3"+v.toLocaleString("en-GB",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtPct(v) { return (v>=0?"+":"")+v.toFixed(2)+"%"; }
function esc(s) { const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
function nextId() { return Math.max(0,...state.holdings.map(h=>h.id))+1; }

function enrich() {
  return state.holdings.map(h => {
    const md = state.marketData[h.ticker]||{};
    const cp = md.price||h.purchasePrice;
    const pc = md.currency||h.currency;
    const cost = toGBP(h.quantity*h.purchasePrice, h.currency, state.fxRates);
    const mkt = toGBP(h.quantity*cp, pc, state.fxRates);
    const capPnl = mkt-cost;
    const capPct = cost?capPnl/cost*100:0;
    const divs = DIVIDENDS_BY_ISIN[h.isin]||0;
    const totPnl = capPnl+divs;
    const totPct = cost?totPnl/cost*100:0;
    const sector = md.sector||SECTOR_MAP[h.ticker]||"Unknown";
    const pe = md.pe||null;
    return { ...h, currentPrice:cp, priceCurrency:pc, costBasisGBP:cost, marketValueGBP:mkt, capitalPnLGBP:capPnl, capitalPnLPct:capPct, dividendsGBP:divs, totalPnLGBP:totPnl, totalPnLPct:totPct, sector, pe };
  });
}

// ─── TWELVE DATA SYMBOL MAPPING ─────────────────────────────────
// Maps dashboard tickers to Twelve Data symbols
const TD_SYMBOL_MAP = {
  "VIE.PA":  "VIE:XPAR",
  "FNTN.DE": "FNTN:XFRA",
  "IGLN.L":  "IGLN:LSE",
  "TEZNY":   "TEZNY",
  "KSB3.DE": "KSB3:XFRA",
  "KAP":     "KAP",
  "ISLN.L":  "ISLN:LSE",
  "BIPS.L":  "BIPS:LSE",
  "MGCI.L":  "MGCI:LSE",
  "UTG.L":   "UTG:LSE",
  "ZPRX.DE": "ZPRX:XFRA",
  "NVO":     "NVO",
  "JAGI.L":  "JAGI:LSE",
  "TBCG.L":  "TBCG:LSE",
};

// Reverse map: TD symbol -> dashboard ticker
const TD_REVERSE = {};
Object.entries(TD_SYMBOL_MAP).forEach(([k,v])=>TD_REVERSE[v]=k);

async function tdFetch(endpoint, params) {
  const url = new URL("https://api.twelvedata.com/" + endpoint);
  params.apikey = state.tdApiKey;
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const resp = await fetch(url.toString());
  if (!resp.ok) throw new Error("Twelve Data request failed: " + resp.status);
  return resp.json();
}

async function refreshPrices() {
  if (!state.tdApiKey) { state.error="Please enter your Twelve Data API key above."; render(); return; }
  if (!state.holdings.length) return;
  state.loading=true; state.error=null; state.loadingMsg="Fetching stock prices..."; render();

  try {
    // Build list of TD symbols for current holdings
    const tdSymbols = state.holdings.map(h => TD_SYMBOL_MAP[h.ticker] || h.ticker);

    // Twelve Data /quote supports up to 120 symbols comma-separated
    // But free tier = 8 credits/min, and /quote costs 1 credit per symbol
    // We'll batch in groups of 8, with a delay between batches
    const batchSize = 8;
    const results = {};
    
    for (let i = 0; i < tdSymbols.length; i += batchSize) {
      const batch = tdSymbols.slice(i, i + batchSize);
      state.loadingMsg = `Fetching prices (${Math.min(i+batchSize, tdSymbols.length)}/${tdSymbols.length})...`; render();
      
      const symbolStr = batch.join(",");
      const data = await tdFetch("quote", { symbol: symbolStr });

      // If single symbol, response is the object directly; if multiple, it's keyed by symbol
      if (batch.length === 1) {
        const sym = batch[0];
        if (data && data.close) results[sym] = data;
      } else {
        Object.entries(data).forEach(([sym, val]) => {
          if (val && val.close && !val.code) results[sym] = val;
        });
      }

      // Rate limit delay between batches (free tier: 8/min)
      if (i + batchSize < tdSymbols.length) {
        state.loadingMsg = `Rate limit pause (free tier: 8 req/min)...`; render();
        await new Promise(r => setTimeout(r, 62000));
      }
    }

    // Now fetch FX rates
    state.loadingMsg = "Fetching exchange rates..."; render();
    // Small delay if we just finished a batch
    if (tdSymbols.length > batchSize) await new Promise(r => setTimeout(r, 62000));
    
    const fxData = await tdFetch("exchange_rate", { symbol: "EUR/GBP" });
    const fxData2 = await tdFetch("exchange_rate", { symbol: "USD/GBP" });

    if (fxData && fxData.rate) state.fxRates.EUR = parseFloat(fxData.rate);
    if (fxData2 && fxData2.rate) state.fxRates.USD = parseFloat(fxData2.rate);

    // Map results back to dashboard tickers
    const newMarketData = {};
    state.holdings.forEach(h => {
      const tdSym = TD_SYMBOL_MAP[h.ticker] || h.ticker;
      const q = results[tdSym];
      if (!q) return;

      const price = parseFloat(q.close) || parseFloat(q.previous_close) || 0;
      // Twelve Data returns London prices in GBP (pounds), we need GBX (pence)
      const isLondon = h.ticker.endsWith(".L");
      const adjustedPrice = isLondon ? price * 100 : price;

      const pe = q.pe_ratio ? parseFloat(q.pe_ratio) : null;
      const sector = SECTOR_MAP[h.ticker] || "Unknown";
      const currency = h.currency;

      newMarketData[h.ticker] = { price: adjustedPrice, pe: (pe && pe > 0) ? pe : null, sector, currency };
    });

    state.marketData = newMarketData;
    state.lastRefresh = new Date().toISOString();
  } catch(err) {
    state.error = "Refresh failed: " + err.message;
  }
  state.loading=false; state.loadingMsg=""; saveState(); render();
}

// ─── CSV UPLOAD ────────────────────────────────────────────────
function handleCSV(file) {
  const reader=new FileReader();
  reader.onload=ev=>{
    const lines=ev.target.result.split("\n").map(l=>l.trim()).filter(Boolean);
    if(lines.length<2) return;
    const hdrs=lines[0].split(",").map(h=>h.trim().toLowerCase());
    const arr=[];
    let id=nextId();
    for(let i=1;i<lines.length;i++){
      const cols=lines[i].split(",").map(c=>c.trim());
      const row={}; hdrs.forEach((h,j)=>row[h]=cols[j]||"");
      arr.push({ id:id++, instrument:row.instrument||row.name||"", ticker:row.ticker||row.symbol||"", isin:row.isin||"", quantity:parseFloat(row.quantity||row.shares||"0")||0, currency:(row.currency||"GBP").toUpperCase(), purchasePrice:parseFloat(row.purchaseprice||row.price||row.cost||"0")||0 });
    }
    if(arr.length){ state.holdings=arr; saveState(); render(); }
  };
  reader.readAsText(file);
}

// ─── PIE CHART SVG ─────────────────────────────────────────────
function pieHTML(data) {
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total) return "";
  let cum=0;
  const slices=data.map(d=>{ const st=cum; cum+=d.value/total; return{...d,start:st,end:cum}; });
  function arc(s,e){
    if(e-s>=0.9999) return "M 0 -1 A 1 1 0 1 1 -0.0001 -1 A 1 1 0 1 1 0 -1";
    const sx=Math.sin(2*Math.PI*s),sy=-Math.cos(2*Math.PI*s);
    const ex=Math.sin(2*Math.PI*e),ey=-Math.cos(2*Math.PI*e);
    return `M 0 0 L ${sx} ${sy} A 1 1 0 ${e-s>0.5?1:0} 1 ${ex} ${ey} Z`;
  }
  let svg=`<svg viewBox="-1.15 -1.15 2.3 2.3" width="210" height="210">`;
  slices.forEach(sl=>{
    svg+=`<path d="${arc(sl.start,sl.end)}" fill="${sl.color}" stroke="#070b14" stroke-width="0.025"><title>${esc(sl.label)}: ${fmtGBP(sl.value)} (${(sl.value/total*100).toFixed(1)}%)</title></path>`;
  });
  svg+=`</svg>`;
  let legend=`<div class="pie-legend">`;
  slices.forEach(sl=>{
    legend+=`<div class="pie-legend-item"><div class="pie-swatch" style="background:${sl.color}"></div><span style="color:var(--text2)">${esc(sl.label)}</span><span style="color:var(--text4);margin-left:auto;padding-left:12px;font-family:var(--mono);font-size:11px">${(sl.value/total*100).toFixed(1)}%</span></div>`;
  });
  legend+=`</div>`;
  return `<div class="pie-wrap">${svg}${legend}</div>`;
}

// ─── RENDER ────────────────────────────────────────────────────
function render() {
  const e = enrich();
  const totalCost=e.reduce((s,h)=>s+h.costBasisGBP,0);
  const totalVal=e.reduce((s,h)=>s+h.marketValueGBP,0);
  const totalDivs=e.reduce((s,h)=>s+h.dividendsGBP,0);
  const totalCapPnL=totalVal-totalCost;
  const totalCapPct=totalCost?totalCapPnL/totalCost*100:0;
  const totalTotPnL=totalCapPnL+totalDivs;
  const totalTotPct=totalCost?totalTotPnL/totalCost*100:0;

  const peH=e.filter(h=>h.pe&&h.pe>0);
  const peW=peH.reduce((s,h)=>s+h.marketValueGBP,0);
  const wPE=peW>0?peH.reduce((s,h)=>s+h.pe*(h.marketValueGBP/peW),0):null;

  const sMap={}; e.forEach(h=>sMap[h.sector]=(sMap[h.sector]||0)+h.marketValueGBP);
  const sData=Object.entries(sMap).map(([l,v])=>({label:l,value:v,color:SECTOR_COLORS[l]||"#64748b"})).sort((a,b)=>b.value-a.value);

  const cMap={}; e.forEach(h=>{ const c=h.priceCurrency==="GBX"?"GBP":h.priceCurrency; cMap[c]=(cMap[c]||0)+h.marketValueGBP; });
  const cData=Object.entries(cMap).map(([l,v])=>({label:l,value:v,color:l==="GBP"?"#2dd4bf":l==="EUR"?"#818cf8":"#fbbf24"})).sort((a,b)=>b.value-a.value);

  const bySize=[...e].sort((a,b)=>b.marketValueGBP-a.marketValueGBP);
  const top5=bySize.slice(0,5).reduce((s,h)=>s+h.marketValueGBP,0);
  const top5Pct=totalVal>0?top5/totalVal*100:0;

  const avgRet=totalTotPct;
  const rf=4.5;
  const sd=e.length>1?Math.sqrt(e.reduce((s,h)=>s+Math.pow(h.totalPnLPct-avgRet,2),0)/(e.length-1)):1;
  const sharpe=sd?((avgRet-rf)/sd):0;

  const sorted=[...e].sort((a,b)=>b.totalPnLPct-a.totalPnLPct);
  const barMax=Math.max(...sorted.map(h=>Math.abs(h.totalPnLPct)),0.01);

  let html=``;

  // Header
  html+=`<div class="header">
    <div class="header-top">
      <div>
        <div class="header-title">
          <div class="status-dot" style="background:${state.lastRefresh?"var(--teal)":"var(--text5)"}"></div>
          <h1>ISA Portfolio</h1>
        </div>
        <p class="header-sub">${state.lastRefresh?`Updated ${new Date(state.lastRefresh).toLocaleString("en-GB")}`:"Prices not yet loaded"}</p>
      </div>
      <button class="refresh-btn" onclick="refreshPrices()" ${state.loading?"disabled":""}>${state.loading?"\u21bb Fetching...":"\u21bb Refresh Prices"}</button>
    </div>
    <div class="nav">
      <button class="nav-btn ${state.view==="dashboard"?"active":""}" onclick="state.view='dashboard';render()">Overview</button>
      <button class="nav-btn ${state.view==="holdings"?"active":""}" onclick="state.view='holdings';render()">Holdings</button>
    </div>
  </div>`;

  html+=`<div class="content">`;

  // API key bar
  // No API key input needed - key is built in

  // Alerts
  if(state.loading) html+=`<div class="alert alert-info">${esc(state.loadingMsg||"Loading...")}</div>`;
  if(state.error) html+=`<div class="alert alert-error">${esc(state.error)}</div>`;

  if(state.view==="dashboard") {
    // Stat cards
    const stats=[
      {label:"Portfolio Value",value:fmtGBP(totalVal),icon:"\u25c8"},
      {label:"Capital P&L",value:fmtGBP(totalCapPnL),sub:fmtPct(totalCapPct),color:totalCapPnL>=0?"var(--teal)":"var(--red)",icon:"\u25b3"},
      {label:"Dividends",value:fmtGBP(totalDivs),sub:"Since Mar 2025",color:"var(--blue)",icon:"\u25cf"},
      {label:"Total Return",value:fmtGBP(totalTotPnL),sub:fmtPct(totalTotPct),color:totalTotPnL>=0?"var(--teal)":"var(--red)",icon:"\u2606"},
      {label:"Wtd Avg P/E",value:wPE?wPE.toFixed(1)+"x":"\u2014",sub:peH.length?`${peH.length} of ${e.length} rated`:"No P/E data",icon:"\u2298"},
      {label:"Sharpe (est.)",value:sharpe.toFixed(2),sub:"vs 4.5% risk-free",color:sharpe>0?"var(--teal)":"var(--red)",icon:"\u25bf"},
      {label:"Concentration",value:top5Pct.toFixed(0)+"%",sub:"Top 5 holdings",icon:"\u25a3"},
    ];
    html+=`<div class="stats-grid">`;
    stats.forEach(s=>{
      html+=`<div class="stat-card"><div class="stat-icon">${s.icon}</div><div class="stat-label">${s.label}</div><div class="stat-value" style="color:${s.color||"#f1f5f9"}">${s.value}</div>${s.sub?`<div class="stat-sub" style="color:${s.color||"var(--text5)"}">${s.sub}</div>`:""}</div>`;
    });
    html+=`</div>`;

    // Charts
    html+=`<div class="charts-grid">
      <div class="card"><h3 class="card-title">Sector Allocation</h3>${pieHTML(sData)}</div>
      <div class="card"><h3 class="card-title">Currency Exposure</h3>${pieHTML(cData)}</div>
    </div>`;

    // Bar chart
    html+=`<div class="card" style="margin-bottom:22px"><h3 class="card-title">Total Return by Holding (Capital + Dividends)</h3>`;
    sorted.forEach(h=>{
      const pct=Math.abs(h.totalPnLPct)/barMax*100;
      const col=h.totalPnLPct>=0?"var(--teal)":"var(--red)";
      html+=`<div class="bar-row"><div class="bar-label">${esc(h.instrument)}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div><div class="bar-value" style="color:${col}">${fmtPct(h.totalPnLPct)}</div></div>`;
    });
    html+=`</div>`;

    // Table
    html+=`<div class="card"><h3 class="card-title">Holdings Detail</h3><div class="table-wrap"><table><thead><tr>`;
    ["Instrument","Ticker","Qty","Avg Cost","Current","Value (\u00a3)","Capital (\u00a3)","Divs (\u00a3)","Total (\u00a3)","Total %","Sector","P/E"].forEach(h=>html+=`<th>${h}</th>`);
    html+=`</tr></thead><tbody>`;
    sorted.forEach(h=>{
      const capCol=h.capitalPnLGBP>=0?"var(--teal)":"var(--red)";
      const totCol=h.totalPnLGBP>=0?"var(--teal)":"var(--red)";
      const sCol=SECTOR_COLORS[h.sector]||"#64748b";
      html+=`<tr>
        <td style="max-width:155px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2)">${esc(h.instrument)}</td>
        <td class="mono" style="font-size:11px;color:var(--text4)">${esc(h.ticker)}</td>
        <td class="mono" style="font-size:11px">${h.quantity<1?h.quantity.toFixed(4):h.quantity.toFixed(2)}</td>
        <td class="mono" style="font-size:11px;color:var(--text3)">${h.purchasePrice.toFixed(2)} <span style="color:var(--text6)">${h.currency}</span></td>
        <td class="mono" style="font-size:11px">${h.currentPrice.toFixed(2)} <span style="color:var(--text6)">${h.priceCurrency}</span></td>
        <td class="mono" style="font-size:11px">${fmtGBP(h.marketValueGBP)}</td>
        <td class="mono" style="font-size:11px;color:${capCol}">${fmtGBP(h.capitalPnLGBP)}</td>
        <td class="mono" style="font-size:11px;color:${h.dividendsGBP>0?"var(--blue)":"var(--text6)"}">${h.dividendsGBP>0?fmtGBP(h.dividendsGBP):"\u2014"}</td>
        <td class="mono" style="font-size:11px;color:${totCol};font-weight:600">${fmtGBP(h.totalPnLGBP)}</td>
        <td class="mono" style="font-size:11px;color:${totCol};font-weight:600">${fmtPct(h.totalPnLPct)}</td>
        <td><span class="sector-badge" style="background:${sCol}18;color:${sCol}">${esc(h.sector)}</span></td>
        <td class="mono" style="font-size:11px;color:var(--text4)">${h.pe?h.pe.toFixed(1):"\u2014"}</td>
      </tr>`;
    });
    html+=`</tbody><tfoot><tr>
      <td colspan="5" style="font-weight:700;color:var(--text3);font-size:12px">TOTAL</td>
      <td class="mono" style="font-size:11.5px;font-weight:700">${fmtGBP(totalVal)}</td>
      <td class="mono" style="font-size:11.5px;font-weight:700;color:${totalCapPnL>=0?"var(--teal)":"var(--red)"}">${fmtGBP(totalCapPnL)}</td>
      <td class="mono" style="font-size:11.5px;font-weight:700;color:var(--blue)">${fmtGBP(totalDivs)}</td>
      <td class="mono" style="font-size:11.5px;font-weight:700;color:${totalTotPnL>=0?"var(--teal)":"var(--red)"}">${fmtGBP(totalTotPnL)}</td>
      <td class="mono" style="font-size:11.5px;font-weight:700;color:${totalTotPct>=0?"var(--teal)":"var(--red)"}">${fmtPct(totalTotPct)}</td>
      <td colspan="2"></td>
    </tr></tfoot></table></div>
    <p class="footnote">Dividends shown are net of withholding tax, from Mar 2025 onwards only.</p></div>`;
  }

  // Holdings management view
  if(state.view==="holdings") {
    html+=`<div class="card">
      <div class="manage-bar">
        <h3>Manage Holdings</h3>
        <div style="display:flex;gap:8px">
          <input type="file" id="csvInput" accept=".csv" style="display:none" onchange="if(this.files[0])handleCSV(this.files[0]);this.value=''">
          <button class="btn-ghost" onclick="document.getElementById('csvInput').click()">Upload CSV</button>
          <button class="btn-primary" onclick="state.view='add';state.editForm={instrument:'',ticker:'',isin:'',quantity:'',currency:'GBP',purchasePrice:''};render()">+ Add</button>
        </div>
      </div>
      <p style="font-size:11.5px;color:var(--text6);margin:0 0 14px">CSV headers: instrument, ticker, isin, quantity, currency, purchaseprice</p>
      <div class="table-wrap"><table><thead><tr>`;
    ["Instrument","Ticker","ISIN","Quantity","Currency","Avg Cost",""].forEach(h=>html+=`<th>${h}</th>`);
    html+=`</tr></thead><tbody>`;
    state.holdings.forEach(h=>{
      if(state.editingId===h.id){
        const ef=state.editForm;
        html+=`<tr>
          <td><input class="edit-input" style="width:100%" value="${esc(ef.instrument||"")}" oninput="state.editForm.instrument=this.value"></td>
          <td><input class="edit-input" style="width:90px" value="${esc(ef.ticker||"")}" oninput="state.editForm.ticker=this.value"></td>
          <td><input class="edit-input" style="width:120px" value="${esc(ef.isin||"")}" oninput="state.editForm.isin=this.value"></td>
          <td><input class="edit-input" type="number" step="any" style="width:90px" value="${ef.quantity||""}" oninput="state.editForm.quantity=this.value"></td>
          <td><select class="edit-input" style="width:70px" onchange="state.editForm.currency=this.value">${["GBP","GBX","EUR","USD"].map(c=>`<option ${ef.currency===c?"selected":""}>${c}</option>`).join("")}</select></td>
          <td><input class="edit-input" type="number" step="any" style="width:90px" value="${ef.purchasePrice||""}" oninput="state.editForm.purchasePrice=this.value"></td>
          <td style="white-space:nowrap"><button class="btn-primary btn-sm" onclick="saveEdit(${h.id})">Save</button> <button class="btn-ghost btn-sm" onclick="state.editingId=null;render()">\u2715</button></td>
        </tr>`;
      } else {
        html+=`<tr>
          <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2)">${esc(h.instrument)}</td>
          <td class="mono" style="font-size:11.5px;color:var(--text4)">${esc(h.ticker)}</td>
          <td class="mono" style="font-size:10.5px;color:var(--text6)">${esc(h.isin)}</td>
          <td class="mono" style="font-size:11.5px">${h.quantity<1?h.quantity.toFixed(4):h.quantity.toFixed(2)}</td>
          <td style="color:var(--text4)">${h.currency}</td>
          <td class="mono" style="font-size:11.5px">${h.purchasePrice.toFixed(2)}</td>
          <td style="white-space:nowrap"><button class="btn-ghost btn-sm" onclick="startEdit(${h.id})">Edit</button> <button class="btn-danger btn-sm" onclick="deleteHolding(${h.id})">Del</button></td>
        </tr>`;
      }
    });
    html+=`</tbody></table></div>
      <div style="margin-top:18px"><button class="btn-danger" onclick="if(confirm('Reset to original ISA holdings?')){state.holdings=[...DEFAULT_HOLDINGS];state.marketData={};saveState();render();}">Reset to Original</button></div>
    </div>`;
  }

  // Add form
  if(state.view==="add") {
    const f=state.editForm;
    html+=`<div class="card add-form">
      <h3 style="font-size:15px;color:#f1f5f9;margin:0 0 20px;font-weight:600">Add New Holding</h3>
      <div class="form-group"><label>Instrument Name</label><input value="${esc(f.instrument||"")}" placeholder="e.g. Apple Inc" oninput="state.editForm.instrument=this.value"></div>
      <div class="form-group"><label>Ticker</label><input value="${esc(f.ticker||"")}" placeholder="e.g. AAPL" oninput="state.editForm.ticker=this.value"></div>
      <div class="form-group"><label>ISIN (optional)</label><input value="${esc(f.isin||"")}" placeholder="e.g. US0378331005" oninput="state.editForm.isin=this.value"></div>
      <div class="form-row">
        <div><label>Quantity</label><input type="number" step="any" value="${f.quantity||""}" oninput="state.editForm.quantity=this.value"></div>
        <div><label>Currency</label><select onchange="state.editForm.currency=this.value">${["GBP","GBX","EUR","USD"].map(c=>`<option ${(f.currency||"GBP")===c?"selected":""}>${c}</option>`).join("")}</select></div>
        <div><label>Avg Price</label><input type="number" step="any" value="${f.purchasePrice||""}" oninput="state.editForm.purchasePrice=this.value"></div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn-primary" style="padding:10px 24px;font-size:13px" onclick="addHolding()">Add Holding</button>
        <button class="btn-ghost" style="padding:10px 24px;font-size:13px" onclick="state.view='holdings';render()">Cancel</button>
      </div>
    </div>`;
  }

  html+=`</div>`; // content
  document.getElementById("app").innerHTML=html;
}

function startEdit(id) {
  const h=state.holdings.find(x=>x.id===id); if(!h) return;
  state.editingId=id;
  state.editForm={instrument:h.instrument,ticker:h.ticker,isin:h.isin,quantity:String(h.quantity),currency:h.currency,purchasePrice:String(h.purchasePrice)};
  render();
}
function saveEdit(id) {
  const f=state.editForm;
  state.holdings=state.holdings.map(h=>h.id===id?{...h,instrument:f.instrument,ticker:f.ticker,isin:f.isin,quantity:parseFloat(f.quantity)||0,currency:f.currency,purchasePrice:parseFloat(f.purchasePrice)||0}:h);
  state.editingId=null; saveState(); render();
}
function deleteHolding(id) {
  state.holdings=state.holdings.filter(h=>h.id!==id); saveState(); render();
}
function addHolding() {
  const f=state.editForm;
  if(!f.instrument||!f.ticker||!f.quantity) return;
  state.holdings.push({id:nextId(),instrument:f.instrument,ticker:f.ticker,isin:f.isin||"",quantity:parseFloat(f.quantity)||0,currency:f.currency||"GBP",purchasePrice:parseFloat(f.purchasePrice)||0});
  state.view="holdings"; saveState(); render();
}

render();
</script>
</body>
</html>
