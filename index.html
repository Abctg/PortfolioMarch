<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arnav's ISA Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04070d;--bg2:#0a1120;--bg3:#0f1729;--bg4:#141e33;--bd:#172033;--bd2:#1c2842;--gw:rgba(99,210,195,.08);--t:#e8edf5;--t2:#bcc5d6;--t3:#8694aa;--t4:#596b85;--t5:#3d4f69;--ac:#63d2c3;--ac2:#4bb8aa;--acbg:rgba(99,210,195,.12);--rd:#e5534b;--rdbg:rgba(229,83,75,.12);--gn:#63d2c3;--gnbg:rgba(99,210,195,.1);--bl:#6fa3f7;--am:#e5a54b;--mono:'JetBrains Mono',monospace;--sans:'Instrument Sans',system-ui,sans-serif;--disp:'Playfair Display',Georgia,serif;--r:10px;--rs:6px}
html{scroll-behavior:smooth}body{background:var(--bg);color:var(--t);font-family:var(--sans);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;opacity:.02;pointer-events:none;z-index:9999;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.hero{position:relative;padding:48px 0 28px;text-align:center;overflow:hidden}
.hero::before{content:'';position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:700px;height:450px;background:radial-gradient(ellipse,rgba(99,210,195,.05) 0%,transparent 70%);pointer-events:none}
.hero-ey{font-family:var(--mono);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--ac);opacity:.65;margin-bottom:12px;animation:fu .7s ease both}
.hero h1{font-family:var(--disp);font-size:clamp(30px,5vw,48px);font-weight:800;color:#f4f7fb;letter-spacing:-1px;line-height:1.15;animation:fu .7s ease .08s both}
.hero h1 i{color:var(--ac);font-style:italic}
.hero-sub{font-size:14.5px;color:var(--t3);margin-top:10px;animation:fu .7s ease .16s both}
.hero-meta{display:flex;justify-content:center;gap:24px;margin-top:16px;font-size:12px;color:var(--t4);animation:fu .7s ease .24s both;flex-wrap:wrap}
.hero-meta span{display:flex;align-items:center;gap:5px}.hdot{width:6px;height:6px;border-radius:50%;display:inline-block}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.ctr{max-width:1180px;margin:0 auto;padding:0 22px 70px}
.nav{display:flex;justify-content:center;gap:3px;margin-bottom:28px;background:var(--bg2);border:1px solid var(--bd);border-radius:11px;padding:3px;width:fit-content;margin-left:auto;margin-right:auto}
.nb{background:transparent;border:none;color:var(--t4);font-family:var(--sans);font-size:13px;font-weight:500;padding:8px 18px;border-radius:8px;cursor:pointer;transition:all .2s}
.nb.on{background:var(--acbg);color:var(--ac);font-weight:600}.nb:hover:not(.on){color:var(--t2)}
.rw{display:flex;flex-direction:column;align-items:center;margin-bottom:22px}
.rb{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--ac2),var(--ac));color:#042f2a;border:none;border-radius:9px;padding:10px 24px;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--sans);letter-spacing:.3px;transition:all .3s;box-shadow:0 0 24px rgba(99,210,195,.12)}
.rb:hover{box-shadow:0 0 32px rgba(99,210,195,.22);transform:translateY(-1px)}.rb:disabled{background:var(--bg3);color:var(--t5);cursor:not-allowed;box-shadow:none;transform:none}
.rb svg{width:16px;height:16px}.rb.ld svg{animation:spin .8s linear infinite}
.rs{text-align:center;font-size:11px;color:var(--t5);margin-top:8px;min-height:16px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:11px;margin-bottom:22px}
.sc{background:linear-gradient(160deg,var(--bg2),var(--bg3));border:1px solid var(--bd);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;transition:border-color .3s}
.sc:hover{border-color:var(--bd2)}.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gw),transparent)}
.sl{font-size:10px;color:var(--t5);text-transform:uppercase;letter-spacing:1.1px;font-weight:600;margin-bottom:8px}
.sv{font-family:var(--mono);font-size:21px;font-weight:600;letter-spacing:-.5px}.ss{font-size:11px;margin-top:5px;font-family:var(--mono)}
.cd{background:linear-gradient(160deg,var(--bg2),var(--bg3));border:1px solid var(--bd);border-radius:var(--r);padding:22px;position:relative;overflow:hidden}
.cd::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gw),transparent)}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.ct{font-size:10.5px;color:var(--t5);text-transform:uppercase;letter-spacing:1.1px;font-weight:700}
.cb{font-family:var(--mono);font-size:10px;color:var(--t4);background:var(--bg);padding:3px 9px;border-radius:16px;border:1px solid var(--bd)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}.gf{margin-bottom:12px}
.pc{display:flex;align-items:center;gap:24px;flex-wrap:wrap}.pl{display:flex;flex-direction:column;gap:5px;flex:1;min-width:150px}
.pr{display:flex;align-items:center;gap:9px;font-size:12px;padding:3px 0}.psw{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.pn{color:var(--t2);flex:1}.pp{font-family:var(--mono);font-size:11px;color:var(--t3)}.pv{font-family:var(--mono);font-size:10.5px;color:var(--t4);min-width:68px;text-align:right}
.br{display:flex;align-items:center;gap:9px;margin-bottom:4px;font-size:11.5px}
.bl{width:135px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;font-size:11px}
.bt{flex:1;background:var(--bg);border-radius:3px;height:20px;overflow:hidden}.bf{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.16,1,.3,1)}
.bv{width:72px;text-align:right;flex-shrink:0;font-family:var(--mono);font-size:11px;font-weight:500}
.tw{overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:11.5px}
th{text-align:left;padding:9px 7px;color:var(--t5);font-weight:600;font-size:9px;text-transform:uppercase;letter-spacing:.7px;white-space:nowrap;border-bottom:1px solid var(--bd)}
td{padding:10px 7px;border-bottom:1px solid rgba(23,32,51,.5)}tbody tr{transition:background .15s}tbody tr:hover{background:rgba(99,210,195,.02)}
tfoot td{border-top:2px solid var(--bd);font-weight:700;padding-top:13px}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9.5px;font-weight:600;white-space:nowrap}
.al{border-radius:8px;padding:10px 16px;margin-bottom:14px;font-size:12px}
.al-w{background:#1a1810;color:var(--am);border:1px solid rgba(229,165,75,.12)}
.al-e{background:#1c1117;color:var(--rd);border:1px solid rgba(229,83,75,.15)}
.ft{text-align:center;padding:36px 22px;font-size:11px;color:var(--t5);border-top:1px solid var(--bd)}
.mr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd)}
.mr-l{font-size:11.5px;color:var(--t3)}.mr-v{font-family:var(--mono);font-size:12px;font-weight:500}
.setup-box{max-width:560px;margin:0 auto 24px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:20px}
.setup-box h3{font-size:14px;color:var(--ac);margin-bottom:10px;font-weight:600}
.setup-box p{font-size:12.5px;color:var(--t3);line-height:1.6;margin-bottom:10px}
.setup-box code{background:var(--bg);padding:2px 7px;border-radius:4px;font-family:var(--mono);font-size:11.5px;color:var(--ac)}
.setup-box input{width:100%;background:var(--bg);border:1px solid var(--bd);color:var(--t);border-radius:6px;padding:9px 12px;font-size:12.5px;font-family:var(--mono);outline:none;margin-top:6px}
.setup-box input:focus{border-color:var(--ac)}
@media(max-width:768px){.g2{grid-template-columns:1fr}.sg{grid-template-columns:repeat(2,1fr)}.bl{width:95px;font-size:10px}.ctr{padding:0 12px 50px}.hero{padding:32px 0 20px}table{font-size:10.5px}th,td{padding:7px 4px}}
@media(max-width:480px){.sg{grid-template-columns:1fr}.pc{flex-direction:column;align-items:flex-start}.hero-meta{flex-direction:column;gap:8px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════════════
// CONFIGURATION - Set your Cloudflare Worker URL here
// ═══════════════════════════════════════════════════════════════
// After deploying worker.js to Cloudflare Workers, paste the URL below.
// Example: "https://isa-prices.your-subdomain.workers.dev"
let WORKER_URL = "https://isaprices.arnavbchowdhury.workers.dev/"

// ═══════════════════════════════════════════════════════════════
// ISA HOLDINGS DATA
// ═══════════════════════════════════════════════════════════════
const H=[
{nm:"Veolia Environnement SA",tk:"VIE.PA",isin:"FR0000124141",qty:62.0390135,cur:"EUR",avg:29.22,sec:"Utilities",geo:"France"},
{nm:"Freenet AG",tk:"FNTN.DE",isin:"DE000A0Z2ZZ5",qty:63.117816,cur:"EUR",avg:28.15,sec:"Telecom",geo:"Germany"},
{nm:"iShares Physical Gold ETC",tk:"IGLN.L",isin:"IE00B4ND3602",qty:30,cur:"GBX",avg:4659.55,sec:"Commodities",geo:"Global"},
{nm:"Terna Rete Elettrica",tk:"TEZNY",isin:"US88088L1035",qty:56.086556,cur:"USD",avg:27.91,sec:"Utilities",geo:"Italy"},
{nm:"KSB SE & Co KGaA",tk:"KSB3.DE",isin:"DE0006292030",qty:0.8084155,cur:"EUR",avg:831.42,sec:"Industrials",geo:"Germany"},
{nm:"NAC Kazatomprom JSC",tk:"KAP",isin:"US63253R2013",qty:30,cur:"USD",avg:43.68,sec:"Energy",geo:"Kazakhstan"},
{nm:"iShares Physical Silver ETC",tk:"ISLN.L",isin:"IE00B4NCWG09",qty:40,cur:"GBX",avg:2976.72,sec:"Commodities",geo:"Global"},
{nm:"Invesco Bond Income Plus",tk:"BIPS.L",isin:"JE00B6RMDP68",qty:1200,cur:"GBX",avg:175.15,sec:"Fixed Income",geo:"UK/Global"},
{nm:"M&G Credit Income Trust",tk:"MGCI.L",isin:"GB00BFYYL325",qty:2100,cur:"GBX",avg:95.07,sec:"Fixed Income",geo:"UK/Global"},
{nm:"UNITE Group PLC",tk:"UTG.L",isin:"GB0006928617",qty:220,cur:"GBX",avg:682.34,sec:"Real Estate",geo:"UK"},
{nm:"SPDR EU Small Cap Value ETF",tk:"ZPRX.DE",isin:"IE00BSPLC298",qty:39,cur:"EUR",avg:58.90,sec:"Sm-Cap Value",geo:"Europe"},
{nm:"Novo Nordisk A/S",tk:"NVO",isin:"DK0062498333",qty:26.5,cur:"EUR",avg:41.97,sec:"Healthcare",geo:"Denmark"},
{nm:"JPMorgan Asia Growth & Inc",tk:"JAGI.L",isin:"GB0001320778",qty:200,cur:"GBX",avg:451.40,sec:"Asia Equity",geo:"Asia-Pacific"},
{nm:"TBC Bank Group PLC",tk:"TBCG.L",isin:"GB00BYT18307",qty:27,cur:"GBX",avg:3818.52,sec:"Financials",geo:"Georgia"},
];

const DIVS={"FR0000124141":21.68,"DE000A0Z2ZZ5":36.96,"IE00B4ND3602":0,"US88088L1035":28.05,"DE0006292030":17.55,"US63253R2013":37.16,"IE00B4NCWG09":0,"JE00B6RMDP68":73.50,"GB00BFYYL325":78.54,"GB0006928617":23.69,"IE00BSPLC298":0,"DK0062498333":0,"GB0001320778":12.10,"GB00BYT18307":11.10};
const SNAP={"VIE.PA":33.43,"FNTN.DE":27.82,"IGLN.L":7481,"TEZNY":34.36,"KSB3.DE":1060,"KAP":79.20,"ISLN.L":5970,"BIPS.L":174,"MGCI.L":93.4,"UTG.L":493,"ZPRX.DE":63.89,"NVO":32.89,"JAGI.L":523,"TBCG.L":4490};
const SC={"Utilities":"#63d2c3","Telecom":"#818cf8","Commodities":"#e5a54b","Energy":"#facc15","Industrials":"#fb923c","Fixed Income":"#8694aa","Real Estate":"#a78bfa","Sm-Cap Value":"#f472b6","Healthcare":"#34d399","Asia Equity":"#6fa3f7","Financials":"#60a5fa"};
const GC={"France":"#63d2c3","Germany":"#818cf8","Global":"#8694aa","Italy":"#34d399","Kazakhstan":"#e5a54b","UK/Global":"#6fa3f7","UK":"#a78bfa","Europe":"#f472b6","Denmark":"#fb923c","Asia-Pacific":"#facc15","Georgia":"#60a5fa"};

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let P={...SNAP},fx={EUR:.838,USD:.785,GBX:.01,GBP:1},lr=null,rfg=false,rmsg="",rerr="",vw="overview";

// ═══════════════════════════════════════════════════════════════
// PRICE REFRESH via Cloudflare Worker
// ═══════════════════════════════════════════════════════════════
async function refreshPrices(){
  if(rfg)return;
  if(!WORKER_URL){rerr="Set your Cloudflare Worker URL above to enable live prices.";render();return;}
  rfg=true;rerr="";rmsg="Fetching live prices...";render();
  try{
    const tks=H.map(h=>h.tk).join(",");
    const resp=await fetch(`${WORKER_URL}?symbols=${encodeURIComponent(tks)}`,{signal:AbortSignal.timeout(20000)});
    if(!resp.ok)throw new Error("Worker returned "+resp.status);
    const data=await resp.json();
    if(data.error)throw new Error(data.error);
    let ok=0,fail=0;
    H.forEach(h=>{
      const q=data[h.tk];
      if(q&&q.price>0){
        let p=q.price;
        // Yahoo returns LSE in GBp (pence). If currency says GBP and ticker is .L, check magnitude.
        if(h.tk.endsWith(".L")&&q.currency==="GBP"){
          const s=SNAP[h.tk];if(s&&s>100&&p<s/10)p*=100;
        }
        P[h.tk]=p;ok++;
      }else fail++;
    });
    if(data.__fx){
      if(data.__fx.EUR)fx.EUR=data.__fx.EUR;
      if(data.__fx.USD)fx.USD=data.__fx.USD;
    }
    lr=new Date().toISOString();
    if(fail>0)rerr=`${ok} updated, ${fail} using fallback prices.`;
  }catch(e){rerr="Refresh failed: "+e.message;}
  rfg=false;rmsg="";render();
}

// ═══════════════════════════════════════════════════════════════
// CALCULATIONS
// ═══════════════════════════════════════════════════════════════
function toG(v,cur){return cur==="GBP"?v:(cur==="GBX"||cur==="GBp")?v*.01:cur==="EUR"?v*fx.EUR:cur==="USD"?v*fx.USD:v;}
function calc(){
  const R=H.map(h=>{
    const cp=P[h.tk]||SNAP[h.tk]||0,mkt=toG(h.qty*cp,h.cur),cost=toG(h.qty*h.avg,h.cur);
    const capPnl=mkt-cost,capPct=cost>0?capPnl/cost*100:0,divs=DIVS[h.isin]||0;
    const totPnl=capPnl+divs,totPct=cost>0?totPnl/cost*100:0;
    return{...h,cp,mkt,cost,capPnl,capPct,divs,totPnl,totPct,wt:0};
  });
  const tv=R.reduce((s,r)=>s+r.mkt,0),tc=R.reduce((s,r)=>s+r.cost,0),td=R.reduce((s,r)=>s+r.divs,0);
  R.forEach(r=>r.wt=tv>0?r.mkt/tv*100:0);
  const tcp=tv-tc,tcpp=tc>0?tcp/tc*100:0,ttp=tcp+td,ttpp=tc>0?ttp/tc*100:0,dy=tv>0?td/tv*100:0;
  const sm={};R.forEach(r=>sm[r.sec]=(sm[r.sec]||0)+r.mkt);
  const secs=Object.entries(sm).map(([k,v])=>({l:k,v,pct:tv>0?v/tv*100:0,c:SC[k]||"#596b85"})).sort((a,b)=>b.v-a.v);
  const gm={};R.forEach(r=>gm[r.geo]=(gm[r.geo]||0)+r.mkt);
  const geos=Object.entries(gm).map(([k,v])=>({l:k,v,pct:tv>0?v/tv*100:0,c:GC[k]||"#596b85"})).sort((a,b)=>b.v-a.v);
  const cm={};R.forEach(r=>{const k=(r.cur==="GBX"||r.cur==="GBp")?"GBP":r.cur;cm[k]=(cm[k]||0)+r.mkt;});
  const curs=Object.entries(cm).map(([k,v])=>({l:k,v,pct:tv>0?v/tv*100:0,c:k==="GBP"?"#63d2c3":k==="EUR"?"#818cf8":"#e5a54b"})).sort((a,b)=>b.v-a.v);
  const srt=[...R].sort((a,b)=>b.mkt-a.mkt),t5=srt.slice(0,5).reduce((s,r)=>s+r.wt,0);
  const byR=[...R].sort((a,b)=>b.totPct-a.totPct);
  return{R,srt,tv,tc,td,tcp,tcpp,ttp,ttpp,dy,secs,geos,curs,t5,byR};
}

// ═══════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════
const esc=s=>{const d=document.createElement("div");d.textContent=s;return d.innerHTML;};
const F=v=>"£"+v.toLocaleString("en-GB",{minimumFractionDigits:2,maximumFractionDigits:2});
const pf=v=>(v>=0?"+":"")+v.toFixed(2)+"%";
const cl=v=>v>=0?"var(--gn)":"var(--rd)";

function pie(data,sz=185){
  const tot=data.reduce((s,d)=>s+d.v,0);if(!tot)return"";let cum=0;
  const sl=data.map(d=>{const s=cum;cum+=d.v/tot;return{...d,s,e:cum};});
  const arc=(s,e)=>{if(e-s>=.9999)return"M 0 -1 A 1 1 0 1 1 -.0001 -1 A 1 1 0 1 1 0 -1";const sx=Math.sin(2*Math.PI*s),sy=-Math.cos(2*Math.PI*s),ex=Math.sin(2*Math.PI*e),ey=-Math.cos(2*Math.PI*e);return`M 0 0 L ${sx} ${sy} A 1 1 0 ${e-s>.5?1:0} 1 ${ex} ${ey} Z`;};
  let g=`<svg viewBox="-1.1 -1.1 2.2 2.2" width="${sz}" height="${sz}" style="flex-shrink:0">`;
  sl.forEach(s=>{g+=`<path d="${arc(s.s,s.e)}" fill="${s.c}" stroke="var(--bg2)" stroke-width=".028"><title>${esc(s.l)}: ${F(s.v)} (${s.pct.toFixed(1)}%)</title></path>`;});
  return g+"</svg>";
}
function pleg(data){return data.map(d=>`<div class="pr"><div class="psw" style="background:${d.c}"></div><span class="pn">${esc(d.l)}</span><span class="pp">${d.pct.toFixed(1)}%</span><span class="pv">${F(d.v)}</span></div>`).join("");}

function render(){
  const D=calc();
  let o="";
  // Hero
  o+=`<div class="hero"><p class="hero-ey">Stocks &amp; Shares ISA</p><h1>Arnav's <i>Portfolio</i></h1>
    <p class="hero-sub">14 holdings across ${new Set(H.map(x=>x.geo)).size} countries and ${new Set(H.map(x=>x.sec)).size} sectors</p>
    <div class="hero-meta"><span><div class="hdot" style="background:${lr?"var(--ac)":"var(--t5)"}"></div>${lr?"Updated "+new Date(lr).toLocaleString("en-GB"):"Snapshot: 4 Mar 2026"}</span>
    <span><div class="hdot" style="background:var(--bl)"></div>Trading 212 ISA</span></div></div><div class="ctr">`;

  // Worker URL setup (only shows if not configured)
  if(!WORKER_URL){
    o+=`<div class="setup-box"><h3>Enable Live Prices</h3>
      <p>To enable the refresh button, deploy the included <code>worker.js</code> to <a href="https://workers.cloudflare.com" target="_blank" style="color:var(--ac)">Cloudflare Workers</a> (free, 2 min) and paste the URL below. Your visitors will then be able to refresh prices with no login or API key.</p>
      <input id="wu" type="text" placeholder="https://your-worker.your-subdomain.workers.dev" value="" oninput="this.style.borderColor=this.value?'var(--ac)':'var(--bd)'">
      <div style="margin-top:10px;display:flex;gap:8px"><button onclick="const v=document.getElementById('wu').value.trim();if(v){WORKER_URL=v;localStorage.setItem('worker_url',v);render();}" style="background:var(--ac);color:#042f2a;border:none;border-radius:6px;padding:7px 16px;cursor:pointer;font-weight:700;font-family:var(--sans);font-size:12px">Save</button>
      <button onclick="document.querySelector('.setup-box').style.display='none'" style="background:transparent;color:var(--t4);border:1px solid var(--bd);border-radius:6px;padding:7px 16px;cursor:pointer;font-family:var(--sans);font-size:12px">Skip (use snapshot data)</button></div></div>`;
  }

  // Refresh button
  o+=`<div class="rw"><button class="rb ${rfg?"ld":""}" onclick="refreshPrices()" ${rfg?"disabled":""}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>${rfg?"Refreshing...":"Refresh Prices"}</button>
    <div class="rs">${rfg?esc(rmsg):(lr?"Live via Yahoo Finance":"Using snapshot prices from 4 Mar 2026")}</div></div>`;
  if(rerr)o+=`<div class="al ${rerr.includes("fail")?"al-e":"al-w"}" style="max-width:560px;margin:0 auto 14px">${esc(rerr)}</div>`;

  // Nav
  o+=`<div class="nav"><button class="nb ${vw==="overview"?"on":""}" onclick="vw='overview';render()">Overview</button><button class="nb ${vw==="holdings"?"on":""}" onclick="vw='holdings';render()">Holdings</button><button class="nb ${vw==="analysis"?"on":""}" onclick="vw='analysis';render()">Analysis</button></div>`;

  if(vw==="overview")o+=rOv(D);else if(vw==="holdings")o+=rHo(D);else o+=rAn(D);
  o+=`</div><div class="ft">Built by Arnav Bagchi Chowdhury · Data from Trading 212 · Not financial advice</div>`;
  document.getElementById("app").innerHTML=o;
}

function rOv(D){
  let o=`<div class="sg">
    <div class="sc"><div class="sl">Market Value</div><div class="sv" style="color:#f4f7fb">${F(D.tv)}</div><div class="ss" style="color:var(--t4)">Cost: ${F(D.tc)}</div></div>
    <div class="sc"><div class="sl">Capital P&amp;L</div><div class="sv" style="color:${cl(D.tcp)}">${F(D.tcp)}</div><div class="ss" style="color:${cl(D.tcpp)}">${pf(D.tcpp)}</div></div>
    <div class="sc"><div class="sl">Dividends</div><div class="sv" style="color:var(--bl)">${F(D.td)}</div><div class="ss" style="color:var(--t4)">Net WHT, since Mar '25</div></div>
    <div class="sc"><div class="sl">Total Return</div><div class="sv" style="color:${cl(D.ttp)}">${F(D.ttp)}</div><div class="ss" style="color:${cl(D.ttpp)}">${pf(D.ttpp)}</div></div>
    <div class="sc"><div class="sl">Dividend Yield</div><div class="sv" style="color:var(--bl)">${D.dy.toFixed(2)}%</div><div class="ss" style="color:var(--t4)">Trailing 12m</div></div>
    <div class="sc"><div class="sl">Positions</div><div class="sv" style="color:#f4f7fb">14</div><div class="ss" style="color:var(--t4)">Top 5 = ${D.t5.toFixed(0)}%</div></div></div>`;
  o+=`<div class="g2"><div class="cd"><div class="ch"><span class="ct">Sector Allocation</span><span class="cb">${D.secs.length} sectors</span></div><div class="pc">${pie(D.secs)}<div class="pl">${pleg(D.secs)}</div></div></div>`;
  o+=`<div class="cd"><div class="ch"><span class="ct">Geographic Exposure</span><span class="cb">${D.geos.length} regions</span></div><div class="pc">${pie(D.geos)}<div class="pl">${pleg(D.geos)}</div></div></div></div>`;
  const bm=Math.max(...D.byR.map(r=>Math.abs(r.totPct)),.01);
  o+=`<div class="cd gf"><div class="ch"><span class="ct">Total Return by Holding</span><span class="cb">Capital + Dividends</span></div>`;
  D.byR.forEach(r=>{const w=Math.abs(r.totPct)/bm*100,bg=r.totPct>=0?"rgba(99,210,195,.3)":"rgba(229,83,75,.3)";o+=`<div class="br"><div class="bl" title="${esc(r.nm)}">${esc(r.nm)}</div><div class="bt"><div class="bf" style="width:${w}%;background:${bg}"></div></div><div class="bv" style="color:${cl(r.totPct)}">${pf(r.totPct)}</div></div>`;});
  o+=`</div>`;return o;
}

function rHo(D){
  let o=`<div class="cd gf"><div class="ch"><span class="ct">All Holdings</span><span class="cb">by market value</span></div><div class="tw"><table><thead><tr>`;
  ["Instrument","Ticker","Sector","Qty","Avg Cost","Current","Wt","Value (£)","Capital","Divs (£)","Total Ret."].forEach(x=>o+=`<th>${x}</th>`);
  o+=`</tr></thead><tbody>`;
  D.srt.forEach(r=>{
    const sc=SC[r.sec]||"#596b85";
    o+=`<tr><td style="color:var(--t2);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500">${esc(r.nm)}</td>
    <td style="font-family:var(--mono);font-size:10.5px;color:var(--t4)">${esc(r.tk)}</td>
    <td><span class="badge" style="background:${sc}14;color:${sc}">${esc(r.sec)}</span></td>
    <td style="font-family:var(--mono);font-size:10.5px">${r.qty<1?r.qty.toFixed(4):r.qty.toFixed(2)}</td>
    <td style="font-family:var(--mono);font-size:10.5px;color:var(--t3)">${r.avg.toFixed(2)} <span style="color:var(--t5);font-size:8.5px">${r.cur}</span></td>
    <td style="font-family:var(--mono);font-size:10.5px">${r.cp.toFixed(2)} <span style="color:var(--t5);font-size:8.5px">${r.cur}</span></td>
    <td style="font-family:var(--mono);font-size:10.5px;color:var(--t3)">${r.wt.toFixed(1)}%</td>
    <td style="font-family:var(--mono);font-size:10.5px;font-weight:500">${F(r.mkt)}</td>
    <td style="font-family:var(--mono);font-size:10.5px;color:${cl(r.capPnl)}">${F(r.capPnl)}<br><span style="font-size:9.5px">${pf(r.capPct)}</span></td>
    <td style="font-family:var(--mono);font-size:10.5px;color:${r.divs>0?"var(--bl)":"var(--t5)"}">${r.divs>0?F(r.divs):"—"}</td>
    <td style="font-family:var(--mono);font-size:11px;font-weight:600;color:${cl(r.totPnl)}">${F(r.totPnl)}<br><span style="font-size:10px">${pf(r.totPct)}</span></td></tr>`;
  });
  o+=`</tbody><tfoot><tr><td colspan="7" style="color:var(--t3);font-size:11px">TOTAL</td>
    <td style="font-family:var(--mono);font-size:11.5px">${F(D.tv)}</td>
    <td style="font-family:var(--mono);font-size:11.5px;color:${cl(D.tcp)}">${F(D.tcp)}<br><span style="font-size:10px">${pf(D.tcpp)}</span></td>
    <td style="font-family:var(--mono);font-size:11.5px;color:var(--bl)">${F(D.td)}</td>
    <td style="font-family:var(--mono);font-size:11.5px;color:${cl(D.ttp)}">${F(D.ttp)}<br><span style="font-size:10px">${pf(D.ttpp)}</span></td></tr></tfoot>`;
  o+=`</table></div><p style="font-size:10.5px;color:var(--t5);margin-top:14px">Dividends net of WHT, Mar 2025 to Mar 2026. FX: 1 EUR = ${fx.EUR.toFixed(4)} GBP, 1 USD = ${fx.USD.toFixed(4)} GBP${lr?" (live)":" (snapshot)"}.</p></div>`;
  return o;
}

function rAn(D){
  const cm={};H.forEach(r=>{const k=(r.cur==="GBX"||r.cur==="GBp")?"GBP":r.cur;cm[k]=(cm[k]||0)+toG(r.qty*(P[r.tk]||SNAP[r.tk]||0),r.cur);});
  const curs=Object.entries(cm).map(([k,v])=>({l:k,v,pct:D.tv>0?v/D.tv*100:0,c:k==="GBP"?"#63d2c3":k==="EUR"?"#818cf8":"#e5a54b"})).sort((a,b)=>b.v-a.v);
  let o=`<div class="g2"><div class="cd"><div class="ch"><span class="ct">Currency Exposure</span></div><div class="pc">${pie(curs,170)}<div class="pl">${pleg(curs)}</div></div></div>`;
  o+=`<div class="cd"><div class="ch"><span class="ct">Top Holdings by Weight</span></div>`;
  const tn=D.srt.slice(0,7),wm=Math.max(...tn.map(r=>r.wt));
  tn.forEach(r=>{const w=r.wt/wm*100;o+=`<div class="br"><div class="bl" title="${esc(r.nm)}">${esc(r.nm)}</div><div class="bt"><div class="bf" style="width:${w}%;background:rgba(99,210,195,.22)"></div></div><div class="bv" style="color:var(--ac)">${r.wt.toFixed(1)}%</div></div>`;});
  o+=`</div></div>`;
  const dp=D.R.filter(r=>r.divs>0).sort((a,b)=>b.divs-a.divs),dm=Math.max(...dp.map(r=>r.divs),.01);
  const bst=D.byR[0],wst=D.byR[D.byR.length-1];
  o+=`<div class="g2"><div class="cd"><div class="ch"><span class="ct">Dividend Contributors</span><span class="cb">${F(D.td)} total</span></div>`;
  dp.forEach(r=>{const w=r.divs/dm*100;o+=`<div class="br"><div class="bl" title="${esc(r.nm)}">${esc(r.nm)}</div><div class="bt"><div class="bf" style="width:${w}%;background:rgba(111,163,247,.28)"></div></div><div class="bv" style="color:var(--bl)">${F(r.divs)}</div></div>`;});
  o+=`</div><div class="cd"><div class="ch"><span class="ct">Performance Extremes</span></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">`;
  o+=`<div style="padding:14px;border-radius:var(--rs);background:var(--gnbg);border:1px solid rgba(99,210,195,.13)"><div style="font-size:9.5px;text-transform:uppercase;letter-spacing:1px;color:var(--ac);font-weight:700;margin-bottom:7px">Best Performer</div><div style="font-size:13px;color:var(--t);font-weight:600;margin-bottom:3px">${esc(bst.nm)}</div><div style="font-family:var(--mono);font-size:17px;color:var(--gn);font-weight:700">${pf(bst.totPct)}</div><div style="font-family:var(--mono);font-size:11px;color:var(--t3);margin-top:2px">${F(bst.totPnl)}</div></div>`;
  o+=`<div style="padding:14px;border-radius:var(--rs);background:var(--rdbg);border:1px solid rgba(229,83,75,.13)"><div style="font-size:9.5px;text-transform:uppercase;letter-spacing:1px;color:var(--rd);font-weight:700;margin-bottom:7px">Worst Performer</div><div style="font-size:13px;color:var(--t);font-weight:600;margin-bottom:3px">${esc(wst.nm)}</div><div style="font-family:var(--mono);font-size:17px;color:var(--rd);font-weight:700">${pf(wst.totPct)}</div><div style="font-family:var(--mono);font-size:11px;color:var(--t3);margin-top:2px">${F(wst.totPnl)}</div></div>`;
  o+=`</div></div></div>`;
  o+=`<div class="cd gf"><div class="ch"><span class="ct">Portfolio Characteristics</span></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:18px">`;
  const mr=(l,v,c)=>`<div class="mr"><span class="mr-l">${l}</span><span class="mr-v" style="color:${c}">${v}</span></div>`;
  o+=`<div><div style="font-size:10px;color:var(--t5);text-transform:uppercase;letter-spacing:1px;margin-bottom:9px;font-weight:600">Return Metrics</div>`;
  o+=mr("Total Return (£)",F(D.ttp),cl(D.ttp))+mr("Total Return (%)",pf(D.ttpp),cl(D.ttpp))+mr("Capital Gain",pf(D.tcpp),cl(D.tcpp))+mr("Income Return",D.dy.toFixed(2)+"%","var(--bl)")+`</div>`;
  o+=`<div><div style="font-size:10px;color:var(--t5);text-transform:uppercase;letter-spacing:1px;margin-bottom:9px;font-weight:600">Diversification</div>`;
  o+=mr("Holdings","14","var(--t)")+mr("Sectors",String(D.secs.length),"var(--t)")+mr("Geographies",String(D.geos.length),"var(--t)")+mr("Top-5 Concentration",D.t5.toFixed(1)+"%","var(--am)")+`</div>`;
  o+=`<div><div style="font-size:10px;color:var(--t5);text-transform:uppercase;letter-spacing:1px;margin-bottom:9px;font-weight:600">Income</div>`;
  o+=mr("Total Dividends",F(D.td),"var(--bl)")+mr("Dividend Payers",dp.length+" of 14","var(--t)")+mr("Avg Per Payer",F(D.td/Math.max(dp.length,1)),"var(--bl)")+mr("Largest Payer",esc(dp[0]?.nm||"—"),"var(--t2)")+`</div>`;
  o+=`</div></div>`;return o;
}

render();
</script>
</body>
</html>
